<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle del Producto</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #6a0572;
        --secondary: #ff4d6d;
        --dark: #1e1e1e;
        --light: #ffffff;
        --bg-color: #fefae0;
        --color-primary: #6a0572;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: radial-gradient(
          circle,
          var(--bg-color) 0%,
          var(--color-primary) 100%
        );
        color: var(--dark);
        min-height: 100vh;
      }

      /* NAVBAR */

      .navbar {
        display: flex;
        justify-content: space-between;
        padding: 18px;
        background: var(--light);
        border-bottom: 1px solid #eee;
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      .navbar a {
        text-decoration: none;
        color: var(--primary);
      }

      /* MAIN */

      main {
        padding: 40px 20px;
        max-width: 1200px;
        margin: auto;
      }

      /* PRODUCT */

      .product-container {
        background: var(--light);
        border-radius: 16px;
        padding: 40px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 40px;
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.15);
      }

      /* IMAGE GALLERY */

      .product-gallery {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .main-image {
        width: 100%;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .thumbnail-container {
        display: flex;
        gap: 10px;
      }

      .thumbnail {
        width: 70px;
        height: 70px;
        object-fit: cover;
        border-radius: 6px;
        cursor: pointer;
        border: 2px solid transparent;
      }

      .thumbnail:hover {
        border-color: var(--primary);
      }

      /* INFO */

      .product-info h1 {
        font-size: 2rem;
        margin-bottom: 10px;
      }

      .price {
        font-size: 1.6rem;
        font-weight: 600;
        color: var(--primary);
        margin: 10px 0;
      }

      .description {
        line-height: 1.7;
        margin-bottom: 20px;
      }

      .attributes {
        list-style: none;
        margin-bottom: 20px;
      }

      .attributes li {
        background: var(--bg-color);
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 8px;
      }

      /* BUTTON */
      .product-info .btn {
        color: var(--bg-color);
        padding: 1%;
      }

      .btn {
        padding: 1rem 1rem;
        text-decoration: none;
        border: none;
        background: var(--color-primary);
        color: white;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: var(--secondary);
      }

      /* PRODUCTOS RELACIONADOS */

      .related-products {
        margin-top: 60px;
      }

      .related-products h2 {
        margin-bottom: 25px;
      }

      .related-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
      }

      .related-card {
        background: var(--light);
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      .related-card img {
        width: 100%;
        border-radius: 8px;
        margin-bottom: 8px;
      }

      .related-card h4 {
        margin-bottom: 5px;
      }

      .related-card .btn {
        color: var(--bg-color);
        padding: 0.5%;
      }

      .related-card .btn:hover {
        background: var(--secondary);
      }

      /* DESKTOP */

      @media (min-width: 768px) {
        .product-container {
          grid-template-columns: 1fr 1fr;
          align-items: center;
        }
      }

      /* DARK MODE */
    </style>
  </head>

  <body>
    <header class="navbar">
      <a href="productos.html">← Volver a la tienda</a>
    </header>

    <main>
      <!-- DETALLE PRODUCTO -->

      <section class="product-container">
        <div class="product-gallery">
          <img id="productImage" class="main-image" src="" alt="" />

          <div class="thumbnail-container" id="thumbnailContainer">
            <!-- JS inserta miniaturas -->
          </div>
        </div>

        <div class="product-info">
          <h1 id="productName"></h1>

          <p id="productPrice" class="price"></p>

          <p id="productDescription" class="description"></p>

          <ul id="productAttributes" class="attributes"></ul>

          <a class="btn">Comprar ahora</a>
        </div>
      </section>

      <!-- PRODUCTOS RELACIONADOS -->

      <section class="related-products">
        <h2>Productos relacionados</h2>

        <div id="relatedProducts" class="related-grid">
          <!-- JS inserta productos -->
        </div>
      </section>
    </main>
    <section class="chat-wpp">
      <a
        href="https://wa.me/573107631419?text=Hola,%20estoy%20interesado%20en%20sus%20productos"
        class="whatsapp-float"
        target="_blank"
        aria-label="Chatear por WhatsApp"
      >
        <img src="imagenes/whatsapp.png" alt="WhatsApp 📴 " />
      </a>
    </section>
    <script src="./js/products.js"></script>
  </body>
</html>
