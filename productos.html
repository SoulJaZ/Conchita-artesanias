<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Productos</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #6a0572;
        --secondary: #ff4d6d;
        --dark: #1e1e1e;
        --light: #ffffff;
        --bg-color: #fefae0;
        --color-primary: #6a0572;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: radial-gradient(
          circle,
          var(--bg-color) 0%,
          var(--color-primary) 100%
        );
        min-height: 100vh;
        color: var(--dark);
      }

      /* NAVBAR */
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--color-primary);
        padding: 1rem 2rem;
        position: relative;
      }

      .logo {
        color: white;
        font-weight: 2px;
        font-size: 1.5rem;
        text-decoration: none;
      }

      .nav-links {
        list-style: none;
        display: flex;
        gap: 20px;
        align-items: center;
      }

      .nav-links a {
        color: white;
        text-decoration: none;
        transition: 0.3s;
      }

      .nav-links a:hover {
        color: var(--color-secondary);
      }

      .toggle-btn {
        background: var(--color-secondary);
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        color: white;
        cursor: pointer;
      }
      .dropdown {
        position: relative;
      }
      .dropbtn {
        background: none;
        border: none;
        color: white;
        cursor: pointer;
      }

      .dropdown-menu {
        position: absolute;
        top: 100%;
        left: 0;
        background: white;
        list-style: none;
        padding: 10px 0;
        display: none;
        min-width: 150px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
      }
      .dropdown-menu li {
        padding: 8px 15px;
      }
      .dropdown-menu li a {
        color: #333;
      }
      .dropdown-menu li:hover {
        background: #f2f2f2;
      }

      /* MOstrar Dropdown */
      .dropdown:hover .dropdown-menu {
        display: block;
        transition: 0.3s;
      }
      /* Menu móvil desplegable */
      .menu-toggle {
        display: none;
        font-size: 26px;
        color: white;
        cursor: pointer;
      }

      /* MAIN */

      main {
        max-width: 1200px;
        margin: auto;
        padding: 40px 20px;
      }

      /* TITLE */

      .products h1 {
        text-align: center;
        margin-bottom: 40px;
        font-size: 2.3rem;
      }

      /* GRID */

      .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 25px;
      }

      /* CARD */

      .product-card {
        background: var(--light);
        border-radius: 15px;
        padding: 1rem;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        transition: 0.3s;
      }

      .product-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      .product-card img {
        width: 100%;
        height: 350px;
        object-fit: fill;
        border-radius: 12px;
        margin-bottom: 1rem;
      }

      .product-card h3 {
        margin-bottom: 6px;
      }

      .price {
        font-weight: 600;
        color: var(--primary);
        margin-bottom: 10px;
      }

      .product-card p {
        font-size: 0.9rem;
        margin-bottom: 15px;
      }
      .product-card .btn {
        color: var(--bg-color);
        padding: 0.5%;
      }

      /* BUTTON */

      .btn {
        padding: 1rem 1rem;
        text-decoration: none;
        border: none;
        background: var(--color-primary);
        color: white;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: var(--color-secondary);
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          gap: 1;
        }

        .nav-links {
          display: none;
          flex-direction: column;
          position: absolute;
          top: 60px;
          left: 0;
          width: 100%;
          flex-direction: column;
          background: var(--color-primary);
          padding: 20px;
        }
        .nav-links.show {
          display: flex;
        }
        .menu-toggle {
          display: block;
        }
      }
    </style>
  </head>

  <body>
    <header id="navbar-container"></header>

    <main>
      <section class="products">
        <h1>Nuestros Productos</h1>
        <img id="productImage" class="main-image" src="" alt="" />

        <div id="productsContainer" class="products-grid"></div>
      </section>
    </main>
    <section class="chat-wpp">
      <a
        href="https://wa.me/573107631419?text=Hola,%20estoy%20interesado%20en%20sus%20productos"
        class="whatsapp-float"
        target="_blank"
        aria-label="Chatear por WhatsApp"
      >
        <img src="imagenes/whatsapp.png" alt="WhatsApp 📴 " />
      </a>
    </section>
    <footer>
      <p>© 2026 Artesanias Cochuelo - Todos los derechos reservados</p>
    </footer>
    <!-- SCRIPT CORRECTO -->
    <script src="./js/product.js"></script>
    <script src="js/navbar.js"></script>
  </body>
</html>
