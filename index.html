<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Portfolio Web</title>
     <!-- Google Font (Punto extra) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      /* VARIABLES */
      :root {
        --color-primary: #0b2545;
        --color-secundary: #0077ff;
        --bg-color: #ffffff;
        --text-color: #222;
      }
      body {
        font-family: "Popins", sans-serif;
        background: var(--bg-color);
        color: var(--text-color);
        line-height: 1.6;
      }

      /* NAVBAR */
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--color-primary);
        padding: 1rem 2rem;
      }
      .logo {
        color: white;
        font-weight: 600;
        font-size: 1.5rem;
      }
      .nav-links {
        list-style: none;
        display: flex;
        gap: 1.5rem;
      }
      .nav-links a {
        color: white;
        text-decoration: none;
        transition: 0.3s;
      }
      .nav-links a:hover {
        color: var(--color-secundary);
      }

      /* HERO */
      .hero {
        padding: 4rem 2rem;
        text-align: center;
        background: #f4f4f4;
      }

      /* SERVICIOS */
      .services {
        display: flex;
        justify-content: center;
        gap: 2rem;
        padding: 3rem 2rem;
      }
      .card {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        flex: 1;
        text-align: center;
      }

      /* CONTACTO */
      .contact {
        padding: 3rem 2rem;
        background: #f9f9f9;
        text-align: center;
      }

      form {
        max-width: 500px;
        margin: 2rem auto;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      input,
      textarea {
        padding: 0.8rem;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      button {
        padding: 0.8rem;
        border: none;
        background: var(--color-primary);
        color: white;
        cursor: pointer;
        border-radius: 6px;
        transition: 0.3s;
      }

      button:hover {
        background: var(--color-secondary);
      }
      footer {
        background: var(--color-primary);
        color: white;
        text-align: center;
        padding: 1rem;
      }
      /* RESPONSIVE */
      @media (max-width: 768px) {
        .nav-links {
            flex-direction: column;
            align-items: center;
        }
        .services {
            flex-direction: column;
        }
        .card {
            width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="logo">MiSitio</div>
        <ul class="nav-links">
          <li><a href="#">Inicio</a></li>
          <li><a href="#">Servicios</a></li>
          <li><a href="#">Proyectos</a></li>
          <li><a href="#">Contacto</a></li>
        </ul>
      </nav>
    </header>
    <section class="hero">
      <h1>Bienvenido a mi sitio web</h1>
      <p>Diseño adaptable utilizando Flexbox y Media Queries.</p>
    </section>

    <section class="services">
      <div class="card">Service 1</div>
      <div class="card">Service 2</div>
      <div class="card">Service 3</div>
    </section>
    <section class="contact">
      <h2>Contacto</h2>
      <form action="">
        <input type="text" placeholder="Nombre" />
        <input type="email" placeholder="Correo" />
        <textarea placeholder="mensaje"></textarea>

        <button type="submit">Enviar</button>
      </form>
    </section>

    <footer>
      <p>© 2026 MiSitio - Todos los derechos reservados</p>
    </footer>
  </body>
</html>
